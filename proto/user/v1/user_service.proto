
// user_service.proto
syntax = "proto3";

package carrental.user.v1;

option go_package = "github.com/B4rt0n1/final_proto/gen/go/user/v1;userv1";

service UserService {
  rpc RegisterUser(RegisterUserRequest) returns (UserResponse);
  rpc LoginUser(LoginUserRequest) returns (AuthResponse);
  rpc LogoutUser(LogoutUserRequest) returns (MessageResponse);
  rpc GetUserById(GetUserByIdRequest) returns (UserResponse);
  rpc UpdateUserProfile(UpdateUserProfileRequest) returns (UserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (MessageResponse);
  rpc VerifyEmail(VerifyEmailRequest) returns (MessageResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (MessageResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (MessageResponse);
  rpc UploadDriverLicense(UploadDriverLicenseRequest) returns (MessageResponse);
  rpc GetUserRentalHistory(GetUserRentalHistoryRequest) returns (RentalHistoryResponse);
  rpc GetUserPaymentMethods(GetUserPaymentMethodsRequest) returns (PaymentMethodsResponse);
}

message User {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone = 5;
  string driver_license_number = 6;
}

message RegisterUserRequest {
  string first_name = 1;
  string last_name = 2;
  string email = 3;
  string password = 4;
  string phone = 5;
}

message LoginUserRequest {
  string email = 1;
  string password = 2;
}

message LogoutUserRequest {
  string user_id = 1;
}

message GetUserByIdRequest {
  string user_id = 1;
}

message UpdateUserProfileRequest {
  string user_id = 1;
  string first_name = 2;
  string last_name = 3;
  string phone = 4;
}

message DeleteUserRequest {
  string user_id = 1;
}

message VerifyEmailRequest {
  string user_id = 1;
  string verification_code = 2;
}

message ResetPasswordRequest {
  string email = 1;
}

message ChangePasswordRequest {
  string user_id = 1;
  string old_password = 2;
  string new_password = 3;
}

message UploadDriverLicenseRequest {
  string user_id = 1;
  string license_number = 2;
  string license_image_url = 3;
}

message GetUserRentalHistoryRequest {
  string user_id = 1;
}

message GetUserPaymentMethodsRequest {
  string user_id = 1;
}

message UserResponse {
  User user = 1;
}

message AuthResponse {
  string token = 1;
  string refresh_token = 2;
}

message RentalHistory {
  string booking_id = 1;
  string car_id = 2;
  string start_date = 3;
  string end_date = 4;
}

message RentalHistoryResponse {
  repeated RentalHistory rentals = 1;
}

message PaymentMethod {
  string id = 1;
  string type = 2;
  string last_four_digits = 3;
}

message PaymentMethodsResponse {
  repeated PaymentMethod methods = 1;
}

message MessageResponse {
  string message = 1;
}
